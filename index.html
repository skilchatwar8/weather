<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Weather App</title>
</head>

<body>
    <div class="container">
        <h1>Weather</h1>

        <div class="searchbox">
            <input type="" text" id="cityInput" placeholder="Enter your city name..." />
            <button class="searchBtn" id="seacrhBtn">Search</button>
        </div>

        <div class="weatherCard">
            <p id="temp">30°C</p>
            <h2 id="cityName">Pune, India</h2>
            <p id="descript">Sunny, Clear sky</p>
            <p id="humidity">Humidity: 55%</p>
            <p id="wind">Wind: 15 km/h</p>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
